<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusFlow</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
          <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>FocusFlow</span>
      </div>
      <div class="date">{{date}}</div>
    </header>

    <!-- Navigation -->
    <nav class="nav">
      <button class="nav-btn active" data-tab="timer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 6v6l4 2"/>
        </svg>
        番茄钟
      </button>
      <button class="nav-btn" data-tab="stats">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 3v18h18"/>
          <path d="M18 17V9"/>
          <path d="M13 17V5"/>
          <path d="M8 17v-3"/>
        </svg>
        统计
      </button>
    </nav>

    <!-- Timer Tab -->
    <div class="tab-content active" id="timer-tab">
      <div class="timer-display">
        <div class="timer-ring">
          <svg class="progress-ring" width="200" height="200">
            <circle class="progress-ring-bg" cx="100" cy="100" r="90"/>
            <circle class="progress-ring-fill" cx="100" cy="100" r="90"/>
          </svg>
          <div class="timer-text">
            <span class="time">25:00</span>
            <span class="status">准备专注</span>
          </div>
        </div>
      </div>

      <div class="timer-controls">
        <button class="btn-primary" id="start-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          开始
        </button>
        <button class="btn-secondary" id="pause-btn" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
          </svg>
          暂停
        </button>
        <button class="btn-secondary" id="reset-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          重置
        </button>
      </div>

      <div class="timer-settings">
        <div class="setting-row">
          <span>专注时长</span>
          <div class="duration-selector">
            <button class="duration-btn" data-duration="15">15</button>
            <button class="duration-btn active" data-duration="25">25</button>
            <button class="duration-btn" data-duration="45">45</button>
            <button class="duration-btn" data-duration="60">60</button>
          </div>
        </div>
      </div>

      <div class="stats-summary">
        <div class="stat-item">
          <span class="stat-value" id="today-pomodoros">0</span>
          <span class="stat-label">今日番茄</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="total-focus-time">0h</span>
          <span class="stat-label">专注时长</span>
        </div>
      </div>
    </div>

    <!-- Stats Tab -->
    <div class="tab-content" id="stats-tab">
      <div class="stats-header">
        <button class="period-btn active" data-period="day">今日</button>
        <button class="period-btn" data-period="week">本周</button>
      </div>

      <div class="chart-container">
        <canvas id="usage-chart" width="320" height="200"></canvas>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-card-value" id="total-time">0h 0m</span>
          <span class="stat-card-label">总使用时间</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-value" id="top-category">-</span>
          <span class="stat-card-label">最常访问</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-value" id="site-count">0</span>
          <span class="stat-card-label">访问网站数</span>
        </div>
        <div class="stat-card">
          <span class="stat-card-value" id="focus-ratio">0%</span>
          <span class="stat-card-label">专注比例</span>
        </div>
      </div>

      <div class="site-list">
        <h3>网站使用排行</h3>
        <div id="site-list-container">
          <!-- Dynamic content -->
        </div>
      </div>
    </div>
  </div>

  <script src="chart.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
